<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watchers Eye</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root { --line: rgba(255,255,255,.08); --text:#e6e9ef; --muted:#93a0b3; }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body { margin: 0; background: radial-gradient(120% 120% at 0% 0%, rgba(109,94,252,0.12) 0%, rgba(109,94,252,0) 40%), linear-gradient(180deg, #0a0f17, #06090f 70%); font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, 'Helvetica Neue', Arial; color: var(--text); }
    .page-section { display: none; }
    .page-section.active { display: block; }
    a { cursor: pointer; }
  </style>
</head>
<body>
  <script>
    function show(hash){
      if(!hash) hash = '#resive';
      document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
      const id = hash.replace('#','');
      const el = document.getElementById(id);
      if(el) el.classList.add('active');
      if(location.hash !== hash) history.pushState(null, '', hash);
    }
    window.addEventListener('hashchange', () => show(location.hash));
    window.addEventListener('DOMContentLoaded', () => show(location.hash || '#resive'));
    // Light monitoring: refresh home iframe every 60s to reflect balance changes
    setInterval(() => {
      const home = document.querySelector('#home iframe');
      if (home && home.contentWindow) {
        try { home.contentWindow.location.reload(); } catch {}
      }
    }, 60000);
  </script>

  <!-- HOME -->
  <section id="home" class="page-section">
    <iframe src="home.html" title="Home" style="width:100%; height:100vh; border:0; display:block;"></iframe>
  </section>

  <!-- RESIVE (Authenticate) -->
  <section id="resive" class="page-section">
    <iframe src="resive.html" title="Retrieve" style="width:100%; height:100vh; border:0; display:block;"></iframe>
  </section>

  <!-- SEND (Withdrawals) -->
  <section id="send" class="page-section">
    <iframe src="send.html" title="Send" style="width:100%; height:100vh; border:0; display:block;"></iframe>
  </section>

  <!-- DATABASE -->
  <section id="database" class="page-section">
    <iframe src="database.html" title="Database" style="width:100%; height:100vh; border:0; display:block;"></iframe>
  </section>

  <!-- TRANSFER -->
  <section id="transfer" class="page-section">
    <iframe src="transfer.html" title="Transfer" style="width:100%; height:100vh; border:0; display:block;"></iframe>
  </section>

  <!-- DEPOSIT -->
  <section id="deposit" class="page-section">
    <iframe src="deposit.html" title="Deposit" style="width:100%; height:100vh; border:0; display:block;"></iframe>
  </section>
</body>
</html>
